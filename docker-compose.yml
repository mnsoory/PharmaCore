services:

  # Database (Azure SQL Edge)
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: pharmacore_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA:       "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - db_data:/var/opt/mssql
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/1433"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    networks:
      - internal

  # Migration Runner
  migrator:
    image: pharmacore-backend:latest
    build:
      context: ./backend
      dockerfile: ../backend.Dockerfile
    environment:
      - MIGRATE_ONLY=true
      - ConnectionStrings__DefaultConnection=Server=db;Database=PharmaCoreDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # Backend API (.NET)
  backend:
    image: pharmacore-backend:latest
    environment:
      - MIGRATE_ONLY=false
      - ConnectionStrings__DefaultConnection=Server=db;Database=PharmaCoreDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - internal

  # Frontend (React / Nginx)
  frontend:
    build:
      context:    ./frontend
      dockerfile: ../frontend.Dockerfile
    container_name: pharmacore_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - internal
      - public

  # Reverse Proxy (Caddy)
  caddy:
    image: caddy:2-alpine
    container_name: pharmacore_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - public
      - internal

volumes:
  db_data:
    name: pharmacore_db_data
  caddy_data:
    name: pharmacore_caddy_data
  caddy_config:
    name: pharmacore_caddy_config

networks:
  internal:
    name: pharmacore_internal
    driver: bridge
    internal: true
  public:
    name: pharmacore_public
    driver: bridge